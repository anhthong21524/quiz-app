    # â”€â”€ Errors â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    ProblemDetail:
      type: object
      required: [code, detail]
      properties:
        code:
          type: string
          description: Machine-readable error code.
          examples:
            - VALIDATION_ERROR
        detail:
          type: string
          description: Human-readable explanation of this occurrence.
          examples:
            - Request validation failed.
        errors:
          type: array
          description: Field-level errors. Present on 400 responses only.
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
                examples:
                  - title
              message:
                type: string
                examples:
                  - must be shorter than or equal to 120 characters

  responses:

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          examples:
            default:
              value:
                code: VALIDATION_ERROR
                detail: Request validation failed.
                errors:
                  - field: title
                    message: must be shorter than or equal to 120 characters
                  - field: questions
                    message: must contain at least 1 elements

    Unauthorized:
      description: Invalid credentials or missing token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          examples:
            default:
              value:
                code: UNAUTHORIZED
                detail: Invalid email or password.

    EmailConflict:
      description: Email is already registered
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          examples:
            default:
              value:
                code: EMAIL_ALREADY_EXISTS
                detail: The email address is already registered.
                errors:
                  - field: email
                    message: already registered

    QuizNotFound:
      description: Quiz not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          examples:
            default:
              value:
                code: QUIZ_NOT_FOUND
                detail: No quiz found with the given ID.
